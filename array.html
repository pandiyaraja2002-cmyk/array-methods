<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- <p id="para1"></p>
    <p id="para2"></p> -->

    <p>The push() method returns the new array length:</p>

    <p id="demo1"></p>
    <p id="demo2"></p>

    <p id="demo3"></p>
    <p id="demo4"></p>


    <p id="demo5"></p>
    <p id="demo6"></p>


    <p id="demo7"></p>
    <p id="demo8"></p>


    <script>
        // const colors = [ "Grey","Violet","Orange","Black" ];
        // let arrlen = colors.length;
        // document.getElementById("para1").innerHTML = arrlen;

        // const fruits = [ "Guava","Mango","Orange","Strawberyy" ];
        // let arrlen1 = fruits.length;
        // document.getElementById("para2").innerHTML = arrlen1;

        // Array methods

        const fruit = ["Banana", "Orange", "Apple", "Mango"];
        document.getElementById("demo7").innerHTML = fruit.pop();
        document.getElementById("demo8").innerHTML = fruit;

        const fruits = ["Banana", "Orange", "Apple", "Mango"];
        document.getElementById("demo1").innerHTML = fruits.push("Kiwi");
        document.getElementById("demo2").innerHTML = fruits;


        const fruit2 = ["Banana", "Orange", "Apple", "Mango"];
        document.getElementById("demo3").innerHTML = fruit2;
        fruit2.shift();
        document.getElementById("demo4").innerHTML = fruit2;


        const fruits1 = ["Banana", "Orange", "Apple", "Mango"];
        document.getElementById("demo5").innerHTML = fruits1;
        fruits1.unshift("Lemon");
        document.getElementById("demo6").innerHTML = fruits1;
    </script>
</body>
</html>
